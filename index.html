<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KONVY — Invoice System</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px}
.hero{text-align:center;margin-bottom:40px}
.logo{font-size:2.4rem;margin-bottom:6px}
.brand{font-size:1.6rem;font-weight:700;color:#1a1a2e}
.tagline{font-size:.9rem;color:#9ca3af;margin-top:6px}
.cards{display:flex;flex-direction:column;gap:10px;width:100%;max-width:380px}
.card{display:flex;align-items:center;gap:16px;padding:18px 22px;border:1.5px solid #f0f0f5;border-radius:16px;text-decoration:none;background:#fff;transition:border-color .2s,background .2s;cursor:pointer}
.card:hover,.card:active{border-color:#f73174;background:#fff5f8}
.flag{font-size:1.8rem;width:40px;text-align:center;flex-shrink:0}
.info{flex:1}
.lang{font-size:1rem;font-weight:700;color:#1a1a2e}
.desc{font-size:.75rem;color:#9ca3af;margin-top:3px}
.arrow{color:#f73174;font-size:1rem}
.footer{margin-top:40px;text-align:center;font-size:.7rem;color:#d1d5db}
</style>
</head>
<body>
<div class="hero">
  <div class="logo"><img src="https://jirajeerach-sudo.github.io/KOCs-invoice/konvy-logo.png" alt="KONVY" onerror="this.style.display='none';this.nextElementSibling.style.display='block'" style="height:54px;object-fit:contain"><span style="display:none;font-size:2rem;font-weight:900;color:#1a1a2e;letter-spacing:.04em">KONVY</span></div>
  <div class="tagline">Invoice &amp; Quotation System</div>
</div>
<div class="cards">
  <a class="card" href="#" onclick="return goLang('index-th.html',this,event)">
    <div class="flag">🇹🇭</div>
    <div class="info">
      <div class="lang">ภาษาไทย</div>
      <div class="desc">ใบเสนอราคา / ใบแจ้งหนี้</div>
    </div>
    <div class="arrow">→</div>
  </a>
  <a class="card" href="#" onclick="return goLang('index-en.html',this,event)">
    <div class="flag">🇬🇧</div>
    <div class="info">
      <div class="lang">English</div>
      <div class="desc">Quotation / Invoice</div>
    </div>
    <div class="arrow">→</div>
  </a>
  <a class="card" href="#" onclick="return goLang('index-zh.html',this,event)">
    <div class="flag">🇨🇳</div>
    <div class="info">
      <div class="lang">中文</div>
      <div class="desc">报价单 / 发票</div>
    </div>
    <div class="arrow">→</div>
  </a>
</div>
<div class="footer">KONVY INTERNATIONAL &middot; KOL SYSTEM</div>

<script>
var ua = navigator.userAgent;
var isLine = /Line\//.test(ua);
var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
var isAndroid = /Android/.test(ua);
var isCopyOnly = /DingTalk|MicroMessenger/.test(ua);
var baseUrl = 'https://jirajeerach-sudo.github.io/KOCs-invoice/';

function goLang(path, el, e) {
  e = e || window.event;
  if (e && e.preventDefault) e.preventDefault();
  if (e && e.returnValue !== undefined) e.returnValue = false;
  var url = baseUrl + path;
  if (isCopyOnly) {
    showCopyUI(url);
  } else {
    setTimeout(function() {
      if (isAndroid && isLine) {
        window.location.href = 'intent://' + url.replace(/^https?:\/\//, '') +
          '#Intent;scheme=https;package=com.android.chrome;S.browser_fallback_url=' + encodeURIComponent(url) + ';end';
      } else if (isIOS && isLine) {
        window.location.href = url.replace('https://', 'x-safari-https://');
        setTimeout(function() { window.location.href = url; }, 1000);
      } else {
        window.location.href = url;
      }
    }, 200);
  }
  return false;
}

function showCopyUI(url) {
  var overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
  overlay.innerHTML =
    '<div style="background:#fff;border-radius:16px;padding:24px;width:100%;max-width:340px;text-align:center;font-family:Sarabun,sans-serif">' +
    '<div style="font-size:1.8rem;margin-bottom:8px">📋</div>' +
    '<div style="font-weight:700;font-size:1rem;margin-bottom:4px;color:#1a1a2e">กรุณาคัดลอกลิงก์นี้</div>' +
    '<div style="font-size:.75rem;color:#888;margin-bottom:14px">แล้วเปิดใน Browser ภายนอกค่ะ<br><span style="color:#f73174">Please copy & open in external browser</span></div>' +
    '<div style="background:#f5f6fa;border-radius:8px;padding:10px 12px;font-size:.72rem;color:#555;word-break:break-all;margin-bottom:14px;text-align:left">' + url + '</div>' +
    '<button onclick="copyUrl(\'' + url + '\')" style="width:100%;background:#f73174;color:#fff;border:none;border-radius:10px;padding:12px;font-family:Sarabun,sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;margin-bottom:8px" id="copyBtn">📋 คัดลอกลิงก์</button>' +
    '<button onclick="this.parentElement.parentElement.remove()" style="width:100%;background:none;border:1px solid #ddd;border-radius:10px;padding:10px;font-family:Sarabun,sans-serif;font-size:.85rem;color:#888;cursor:pointer">ปิด</button>' +
    '</div>';
  document.body.appendChild(overlay);
}

function copyUrl(url) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(function() {
      var btn = document.getElementById('copyBtn');
      if (btn) { btn.textContent = '✅ คัดลอกแล้ว!'; btn.style.background = '#2dd393'; }
    });
  } else {
    var ta = document.createElement('textarea');
    ta.value = url; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    var btn = document.getElementById('copyBtn');
    if (btn) { btn.textContent = '✅ คัดลอกแล้ว!'; btn.style.background = '#2dd393'; }
  }
}
</script>
</body>
</html>

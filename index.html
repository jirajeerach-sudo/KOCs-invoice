<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KONVY KOL — Invoice System</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px}
.hero{text-align:center;margin-bottom:48px}
.logo{font-size:2.4rem;margin-bottom:6px}
.brand{font-size:1.6rem;font-weight:700;color:#1a1a2e}
.brand span{color:#f73174}
.tagline{font-size:.9rem;color:#9ca3af;margin-top:6px}
.cards{display:flex;flex-direction:column;gap:12px;width:100%;max-width:380px}
.card{display:flex;align-items:center;gap:16px;padding:18px 22px;border:1.5px solid #f0f0f5;border-radius:16px;text-decoration:none;background:#fff;transition:all .2s}
.card:hover{border-color:#f73174;background:#fff5f8;transform:translateY(-2px);box-shadow:0 8px 24px rgba(247,49,116,.1)}
.flag{font-size:1.8rem;width:40px;text-align:center;flex-shrink:0}
.info{flex:1}
.lang{font-size:1rem;font-weight:700;color:#1a1a2e}
.desc{font-size:.75rem;color:#9ca3af;margin-top:3px}
.arrow{color:#f73174;font-size:1rem;opacity:0;transition:opacity .18s}
.card:hover .arrow{opacity:1}
.footer{margin-top:48px;text-align:center;font-size:.72rem;color:#d1d5db}
.dot{display:inline-block;width:4px;height:4px;background:#f73174;border-radius:50%;margin:0 8px;vertical-align:middle}
</style>
</head>
<body>

<div class="hero">
  <div class="logo">🧾</div>
  <div class="brand">KONVY <span>KOL</span></div>
  <div class="tagline">Invoice &amp; Quotation System</div>
</div>

<div class="cards">
  <a class="card" href="index-th.html">
    <div class="flag">🇹🇭</div>
    <div class="info">
      <div class="lang">ภาษาไทย</div>
      <div class="desc">ใบเสนอราคา / ใบแจ้งหนี้</div>
    </div>
    <div class="arrow">→</div>
  </a>

  <a class="card" href="index-en.html">
    <div class="flag">🇬🇧</div>
    <div class="info">
      <div class="lang">English</div>
      <div class="desc">Quotation / Invoice</div>
    </div>
    <div class="arrow">→</div>
  </a>

  <a class="card" href="index-zh.html">
    <div class="flag">🇨🇳</div>
    <div class="info">
      <div class="lang">中文</div>
      <div class="desc">报价单 / 发票</div>
    </div>
    <div class="arrow">→</div>
  </a>
</div>

<div class="footer">
  KONVY INTERNATIONAL<span class="dot"></span>KOL SYSTEM
</div>

</body>
</html>
